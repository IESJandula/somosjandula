# -----------------------------------------------------------------------------
# Nginx para servir la SPA somosjandula (Vue 3 + Ionic + Vite)
# -----------------------------------------------------------------------------
# Clave: fallback SPA. Al usar vue-router en modo history, cualquier ruta que no
# corresponda a un fichero real debe devolver index.html para que el router del
# cliente resuelva la navegacion (evita 404 al refrescar en rutas internas).
# -----------------------------------------------------------------------------
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresion basica de textos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Fallback SPA: si no existe el fichero/dir, servimos index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cacheo agresivo de assets con hash en el nombre (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # El HTML y el service worker NO deben cachearse (para publicar cambios)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache";
    }
}
